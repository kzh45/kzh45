<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NYC Subway Live Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="map.css" />
</head>
<body class="map-body">
<header class="map-header">
  <h1>Subway Live Map</h1>
  <p id="status">
    <span id="status-spinner" class="spinner" hidden></span>
    <span id="status-text">Loading…</span>
    <button id="retry-btn" type="button" hidden>Retry now</button>
  </p>
  <a class="board-link" href="index.html">List view</a>
</header>

<div id="map"></div>

<div class="legend">
  <span>Ring: <i class="dot on-time"></i> On time</span>
  <span><i class="dot delayed"></i> Delayed</span>
  <span><i class="dot unknown"></i> Unknown</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="map.js"></script>
</body>
</html>
