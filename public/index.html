<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>7 Train Live Arrivals</title>

</head>
<body>
<header>
  <h1><span class="bullet">7</span> Train — Live Arrivals</h1>

  <a class="board-link" href="map.html">Live map</a>
</header>

<main>
  <section class="column">
    <h2>Flushing-bound</h2>
    <ul id="board-N" class="board"></ul>
  </section>
  <section class="column">
    <h2>Manhattan-bound</h2>
    <ul id="board-S" class="board"></ul>
  </section>
</main>

<script src="app.js"></script>
</body>
