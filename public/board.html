<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Headway — arrivals board</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <h1><span class="bullet" id="route-bullet">7</span> <span id="board-title">Arrivals</span></h1>
  <p id="status">
    <span id="status-spinner" class="spinner" hidden></span>
    <span id="status-text">Loading…</span>
    <button id="retry-btn" type="button" aria-label="Retry loading live data" hidden>Retry now</button>
  </p>
  <div id="route-picker"></div>
  <a class="board-link" href="/">Live map</a>
</header>

<main>
  <section class="column">
    <h2 id="dir-N-label">Northbound</h2>
    <ul id="board-N" class="board"></ul>
  </section>
  <section class="column">
    <h2 id="dir-S-label">Southbound</h2>
    <ul id="board-S" class="board"></ul>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
